# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
kotlin.code.style=official
# React Native flags
newArchEnabled=false
hermesEnabled=true

# Suppress AGP 8.1.1 warning about compileSdk 35
android.suppressUnsupportedCompileSdk=35

# Let Android Studio provide the Gradle JDK for this machine.
# If needed, set Gradle JDK in Android Studio to an installed JDK 17.
# To force Gradle to use a specific JDK, uncomment the following line and replace the path with your JDK 17 installation:
# org.gradle.java.home=/path/to/your/jdk-17-installation
